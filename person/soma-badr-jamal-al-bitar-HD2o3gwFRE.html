<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>سومة بدر جمال البيطار</title>
    <meta name="description" content="Digital memorial for سومة بدر جمال البيطار (Soma Badr Jamal Al-Bitar). Born: 2023-10-03. Martyred: 2023.">
    <meta name="keywords" content="gaza, war">

    <!-- External Assets -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../css/style.css">
    <script src="../js/lang-switcher.js" defer></script>
    <script src="../js/utils.js" defer></script>
</head>
<body>
    <nav class="lang-nav">
        <!-- Changing the hash triggers the JS lang switcher instantly -->
        <select class="lang-select" onchange="location.hash = this.value">
            <option value="en">English</option>
            <option value="ar">العربية</option>
        </select>
    </nav>

    <main class="memorial-container">
        <article class="memorial-card">
            <header class="memorial-header">
                <h1 class="native-name arabic" dir="rtl">سومة بدر جمال البيطار</h1>
                <h2 id="name-translation" class="translation-subtitle" data-auto-dir data-translations='{"en":"Soma Badr Jamal Al-Bitar"}'></h2>
            </header>
            <section class="memorial-content">
                <div class="life-dates">
                    <p>
                        <span data-translations='{"en": "Born", "ar": "وُلِدّ"}'>Born</span>: 
                        <time>2023-10-03</time>
                    </p>
                    <p>
                        <span data-translations='{"en": "Martyred", "ar": "شهيد"}'>Martyred</span>: 
                        <time>2023</time>
                    </p>
                </div>
                <div class="tags-container">
                    <span class="tag">#gaza</span> <span class="tag">#war</span> 
                </div>
                <button id="toggleBtn" style="display: none;">Hide</button>
                <div id="data">
                    <hr>
                    <p class="id-badge">ID: HD2o3gwFRE</p>
                </div>
            </section>
            <footer class="memorial-footer">
                <hr>
                <a href="../index.html" data-translations='{"en": "← Back to Index", "ar": "← العودة إلى الفهرس"}'>← Back to Index</a>
            </footer>
        </article>
    </main>
</body>
</html>
